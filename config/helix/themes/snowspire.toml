inherits = "default"

# UI
"ui.background" = { bg = "neutral-800" }
"ui.text" = { fg = "neutral-200" }
"ui.linenr" = { fg = "neutral-500" }
"ui.linenr.selected" = { fg = "sky-200" }
"ui.cursor" = { fg = "neutral-900", bg = "neutral-200" }
"ui.cursor.primary" = { fg = "neutral-900", bg = "sky-300" }
"ui.cursorline.primary" = { bg = "neutral-900" }
"ui.selection" = { bg = "neutral-600" }
"ui.selection.primary" = { bg = "neutral-500" }
"ui.highlight" = { bg = "neutral-700" }
"ui.menu" = { fg = "neutral-200", bg = "neutral-900" }
"ui.menu.selected" = { fg = "neutral-900", bg = "sky-300" }
"ui.popup" = { fg = "neutral-200", bg = "neutral-900" }
"ui.popup.info" = { fg = "neutral-400", bg = "neutral-900" }
"ui.help" = { fg = "neutral-300", bg = "neutral-900" }
"ui.window" = { fg = "neutral-700" }
"ui.gutter" = { bg = "neutral-800" }
"ui.statusline" = { fg = "neutral-400", bg = "neutral-950" }
"ui.statusline.normal" = { fg = "neutral-900", bg = "sky-400" }
"ui.statusline.insert" = { fg = "neutral-900", bg = "teal-400" }
"ui.statusline.select" = { fg = "neutral-900", bg = "violet-400" }
"ui.statusline.inactive" = { fg = "neutral-500", bg = "neutral-900" }
"ui.bufferline" = { fg = "neutral-500", bg = "neutral-900" }
"ui.bufferline.active" = { fg = "neutral-200", bg = "neutral-800" }
"ui.bufferline.background" = { bg = "neutral-950" }
"ui.virtual.ruler" = { bg = "neutral-900" }
"ui.virtual.whitespace" = { fg = "neutral-700" }
"ui.virtual.indent-guide" = { fg = "neutral-700" }
"ui.virtual.inlay-hint" = { fg = "neutral-600", modifiers = ["italic"] }
"ui.virtual.jump-label" = { fg = "amber-300", modifiers = ["bold"] }

# Syntax
"comment" = { fg = "neutral-600", modifiers = ["italic"] }
"keyword" = { fg = "amber-100" }
"keyword.control" = { fg = "sky-300" }
"keyword.operator" = { fg = "amber-100" }
"operator" = { fg = "amber-100" }
"constant.builtin" = { fg = "cyan-400" }
"type" = { fg = "neutral-400" }
"type.builtin" = { fg = "blue-200" }
"function" = { fg = "sky-200" }
"function.method" = { fg = "neutral-300" }
"function.builtin" = { fg = "amber-100" }
"tag" = { fg = "blue-300" }
"namespace" = { fg = "cyan-200" }
"attribute" = { fg = "red-300" }
"tag.attribute" = { fg = "red-300" }
"variable" = { fg = "neutral-200" }
"variable.parameter" = { fg = "sky-400" }
"variable.builtin" = { fg = "teal-300" }
"constant" = { fg = "blue-200" }
"constant.numeric" = { fg = "orange-300" }
"number" = { fg = "orange-300" }
"string" = { fg = "green-200" }
"string.special" = { fg = "cyan-300" }
"punctuation" = { fg = "neutral-400" }
"punctuation.delimiter" = { fg = "neutral-400" }
"punctuation.bracket" = { fg = "neutral-300" }
"label" = { fg = "sky-300" }

# Markup
"markup.heading" = { fg = "sky-400", modifiers = ["bold"] }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.link.url" = { fg = "blue-300", modifiers = ["underlined"] }
"markup.link.text" = { fg = "cyan-300" }
"markup.raw" = { fg = "green-200" }
"markup.list" = { fg = "sky-400" }
"markup.quote" = { fg = "neutral-400", modifiers = ["italic"] }

# Diff
"diff.plus" = { fg = "green-400" }
"diff.minus" = { fg = "rose-400" }
"diff.delta" = { fg = "amber-300" }

# Diagnostics
"diagnostic.error" = { underline = { color = "rose-300", style = "curl" } }
"diagnostic.warning" = { underline = { color = "yellow-300", style = "curl" } }
"diagnostic.info" = { underline = { color = "purple-300", style = "curl" } }
"diagnostic.hint" = { underline = { color = "teal-300", style = "curl" } }
"error" = { fg = "rose-300" }
"warning" = { fg = "yellow-300" }
"info" = { fg = "purple-300" }
"hint" = { fg = "teal-300" }

